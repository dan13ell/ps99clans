        .btn-clans:hover:not(:active) ~ .text-clans { transform: scale(1.06) translate(-3px, 2px); }
        .btn-topclans:hover:not(:active) ~ .text-topclans { transform: scale(1.06) translate(-3px, 2px); }

<body>

    <div class="app-scaler" id="appScaler">
        <div class="game-window">
            <img class="menu-bg" src="images/main-menu.png" draggable="false">
            
            <div class="clans-logo"></div>
            
            <div class="menu-btn btn-clans" onclick="location.href='index.html'" ></div>
            <div class="menu-btn btn-topclans" onclick="location.href='topclans.html'" ></div>
            <div class="menu-btn btn-people is-active" onclick="location.href='leagues.html'" ></div>
            <div class="menu-btn btn-search" onclick="location.href='people.html'" ></div>
            
            <img class="menu-text text-clans" src="images/text-Clans.png" draggable="false">
            <img class="menu-text text-topclans" src="images/text-Top-Clans.png" draggable="false">
            <img class="menu-text text-people" src="images/leagues-text.png" draggable="false">
            <img class="menu-text text-search" src="images/text-People.png" draggable="false">
            
            <div class="tab-content" id="tab-topclans">
                <div class="leaderboard-search-asset">
                    <input type="text" class="leaderboard-search-input" placeholder="Search" id="clanSearch" maxlength="4">
                </div>

                <div class="leaderboard-container" id="leaderboardList">
                    <div id="clanCardsList"></div>
                    
                    <div class="leaderboard-footer" id="leaderboardFooter">
                        <div class="page-select-bg" id="pageSelectBg">
                            <div class="page-arrow arrow-left" id="prevPageBtn" ></div>
                            <span class="page-number-text" id="pageNumberDisplay">1</span>
                            <div class="page-arrow arrow-right" id="nextPageBtn" ></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="close-btn" onclick="location.href='index.html'" ></div>
        </div>
    </div>

    <div class="orientation-popup-overlay" id="orientationPopup">
        <div class="orientation-popup-card">
            <div class="popup-close-x" id="popupCloseBtn"></div>
            
            <div class="popup-icon-container">
                <svg class="popup-icon-svg" viewBox="0 0 24 24">
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                </svg>
            </div>
            
            <div class="popup-title">Rotate Phone</div>
            <div class="popup-text">Rotate your device horizontally for the best experience!</div>
            
            <button class="popup-rotate-btn" id="popupRotateActionBtn">ROTATE SCREEN</button>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://rough-pine-d90f.ps99clans.workers.dev";
        let leaguesData = [];
        let searchQuery = "";
        let currentPage = 1;
        const itemsPerPage = 100;
        let preservedScrollTop = null;

        function autoFitScreen() {
            const scaler = document.getElementById("appScaler");
            if (!scaler) return;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            if (winW >= 1150) {
                document.body.classList.remove("is-mobile");
                scaler.style.transform = "none";
                hideOrientationPopup();
                return;
            }

            document.body.classList.add("is-mobile");
            const requiredW = 1120;
            const requiredH = 960; 

            const scaleX = winW / requiredW;
            const scaleY = winH / requiredH;

            const scale = Math.min(scaleX, scaleY) * 0.92;
            scaler.style.transform = `scale(${scale})`;

            checkOrientationPopup();
        }

        function checkOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (!popup) return;

            const hasBeenDismissed = sessionStorage.getItem("orientationPopupDismissed") === "true";

            const isMobile = window.innerWidth < 1150;
            const isPortrait = window.innerHeight > window.innerWidth;

            if (isMobile && isPortrait && !hasBeenDismissed) {
                popup.classList.add("show");
            } else {
                popup.classList.remove("show");
            }
        }

        function dismissOrientationPopup() {
            sessionStorage.setItem("orientationPopupDismissed", "true");
            hideOrientationPopup();
        }

        function hideOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (popup) popup.classList.remove("show");
        }

        document.getElementById("popupCloseBtn")?.addEventListener("click", () => {
            dismissOrientationPopup();
        });

        document.getElementById("popupRotateActionBtn")?.addEventListener("click", () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(() => {});
            }
            dismissOrientationPopup();
        });

        window.addEventListener("resize", autoFitScreen);
        window.addEventListener("orientationchange", autoFitScreen);

        function formatNumber(num) {
            if (num === undefined || num === null) return "0";
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        function getClanIconUrl(iconAsset) {
            if (!iconAsset) return "https://placehold.co/90x90/ffffff/000000?text=Clan";
            const match = iconAsset.match(/\d+/);
            if (match) {
                return `https://ps99.biggamesapi.io/image/${match[0]}`;
            }
            return "https://placehold.co/90x90/ffffff/000000?text=Clan";
        }

        function generateFallbackData() {
            const fallback = [];
            for (let i = 1; i <= 100; i++) {
                const rank = (currentPage - 1) * itemsPerPage + i;
                fallback.push({
                    Name: `LEAG${rank}`,
                    Points: Math.floor(2500000000 / rank),
                    Members: Math.max(1, Math.min(74, Math.floor(74 - (rank % 70)))),
                    MemberCapacity: 75,
                    Icon: "rbxassetid://1372728282",
                    _originalRank: rank
                });
            }
            return fallback;
        }

        async function fetchLeaguesData(isSilent = false) {
            const list = document.getElementById("clanCardsList");
            const scrollContainer = document.getElementById("leaderboardList");
            
            if (scrollContainer && !isSilent) {
                preservedScrollTop = scrollContainer.scrollTop;
            }

            if (!isSilent && list && leaguesData.length === 0) {
                list.innerHTML = `<div class="leaderboard-loading">Loading...</div>`;
            }

            try {
                const res = await fetch(`${WORKER_URL}/v1/leagues?page=${currentPage}&pageSize=${itemsPerPage}&sort=Points`);
                const data = await res.json();
                
                let parsedArray = [];
                if (data && data.status === "ok") {
                    const rawData = data.data;
                    if (Array.isArray(rawData)) {
                        parsedArray = rawData;
                    } else if (rawData && typeof rawData === 'object') {
                        const innerArray = Object.values(rawData).find(val => Array.isArray(val));
                        if (innerArray) parsedArray = innerArray;
                    }
                }
                
                if (parsedArray.length > 0) {
                    leaguesData = parsedArray.map((item, idx) => ({
                        ...item,
                        _originalRank: (currentPage - 1) * itemsPerPage + idx + 1
                    }));
                } else {
                    leaguesData = generateFallbackData();
                }
            } catch (err) {
                console.warn("Chyba při stahování dat, aktivace fallbacku:", err);
                leaguesData = generateFallbackData();
            }
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const list = document.getElementById("clanCardsList");
            const pageText = document.getElementById("pageNumberDisplay");
            const scrollContainer = document.getElementById("leaderboardList");
            
            if (!list || !scrollContainer) return;
            
            list.innerHTML = "";

            let displayData = leaguesData;

            if (searchQuery.trim() !== "") {
                displayData = leaguesData.filter(clan => clan.Name && clan.Name.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            displayData.forEach((clan) => {
                const absoluteRank = clan._originalRank;
                const row = document.createElement("div");
                row.className = "clan-row";

                const formattedPoints = formatNumber(clan.Points);
                const rawMembers = clan.Members !== undefined ? clan.Members : 0;
                const mCount = rawMembers;
                const mCap = clan.MemberCapacity !== undefined ? clan.MemberCapacity : 75;
                
                const rankColor = (absoluteRank === 1) ? "#8AFCED" : "#FFFFFF";
                const clanIconUrl = getClanIconUrl(clan.Icon);

                row.innerHTML = `
                    <div class="clan-rank" style="color: ${rankColor};">#${absoluteRank}</div>
                    <img class="clan-icon" src="${clanIconUrl}" onerror="this.onerror=null; this.src='https://placehold.co/90x90/ffffff/000000?text=Clan';" draggable="false">
                    <div class="clan-name">[${clan.Name}]</div>
                    <div class="clan-members" data-text="${mCount}/${mCap}">${mCount}/${mCap}</div>
                    <div class="clan-points-wrapper">
                        <div class="clan-star-icon"></div>
                        <div class="clan-points">${formattedPoints}</div>
                    </div>
                `;
                list.appendChild(row);
            });

            if (pageText) pageText.textContent = currentPage;
            
            if (preservedScrollTop !== null) {
                scrollContainer.scrollTop = preservedScrollTop;
                preservedScrollTop = null; 
            }
        }

        const inputSearch = document.getElementById("clanSearch");
        if (inputSearch) {
            inputSearch.addEventListener("input", (e) => {
                searchQuery = e.target.value;
                renderLeaderboard();
            });
        }

        const prevBtn = document.getElementById("prevPageBtn");
        const nextBtn = document.getElementById("nextPageBtn");

        if (prevBtn && nextBtn) {
            prevBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentPage > 1) { 
                    currentPage--; 
                    leaguesData = [];
                    fetchLeaguesData(false);
                }
            });
            nextBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentPage < 30) {
                    currentPage++; 
                    leaguesData = [];
                    fetchLeaguesData(false); 
                }
            });
        }

        setInterval(() => {
            fetchLeaguesData(true);
        }, 60000);

        window.addEventListener('DOMContentLoaded', () => {
            autoFitScreen();
            fetchLeaguesData(false);
        });

        const footer = document.getElementById('leaderboardFooter');
        const arrowL = document.getElementById('prevPageBtn');
        const arrowR = document.getElementById('nextPageBtn');

        if (arrowL && footer) {
            arrowL.addEventListener('mouseenter', () => footer.classList.add('hover-left'));
            arrowL.addEventListener('mouseleave', () => { footer.classList.remove('hover-left', 'active-left'); });
            arrowL.addEventListener('mousedown', () => footer.classList.add('active-left'));
            arrowL.addEventListener('mouseup', () => footer.classList.remove('active-left'));
        }
        if (arrowR && footer) {
            arrowR.addEventListener('mouseenter', () => footer.classList.add('hover-right'));
            arrowR.addEventListener('mouseleave', () => { footer.classList.remove('hover-right', 'active-right'); });
            arrowR.addEventListener('mousedown', () => footer.classList.add('active-right'));
            arrowR.addEventListener('mouseup', () => footer.classList.remove('active-right'));
        }
    </script>
</body>
</html>
