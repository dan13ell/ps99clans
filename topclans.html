            gap: 8px !important;
        }

        html, body {
            width: 100vw;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overscroll-behavior: none !important;
            touch-action: none;
        }

        .leaderboard-container, 
        .country-list-scroll {
            touch-action: pan-y !important;
            overscroll-behavior: contain !important;
        }
    </style>
</head>
<body>

    <div class="app-scaler" id="appScaler">
        <div class="game-window">
            <img class="menu-bg" src="https://i.postimg.cc/sfG6nXsc/main-menu.png" draggable="false">
            
            <div class="clans-logo"></div>
            
            <div class="menu-btn btn-clans" onclick="location.href='index.html'" ></div>
            <div class="menu-btn btn-topclans is-active" onclick="location.href='topclans.html'" ></div>
            <div class="menu-btn btn-people" onclick="location.href='leagues.html'" ></div>
            <div class="menu-btn btn-search" onclick="location.href='people.html'" ></div>
            
            <img class="menu-text text-clans" src="https://i.postimg.cc/7YwkVBKh/text-Clans.png" draggable="false">
            <img class="menu-text text-topclans" src="https://i.postimg.cc/bv7X2LGJ/text-Top-Clans.png" draggable="false">
            <img class="menu-text text-people" src="https://i.postimg.cc/vBjLqZp7/leagues-text.png" draggable="false">
            <img class="menu-text text-search" src="https://i.postimg.cc/9FW6TDfB/text-People.png" draggable="false">
            
            <div class="tab-content" id="tab-topclans">
                <div class="leaderboard-select-asset"></div>
                <div class="leaderboard-search-asset">
                    <input type="text" class="leaderboard-search-input" placeholder="Search" id="clanSearch" maxlength="4">
                </div>

                <div class="leaderboard-icon icon-star" id="sortPoints"></div>
                <div class="leaderboard-icon icon-gem" id="sortGems"></div>

                <div class="leaderboard-container" id="leaderboardList">
                    <div class="active-clan-war-banner" id="clanWarBanner">
                        <div class="banner-title" id="bannerTitle">Loading...</div>
                        <div class="banner-timer" id="bannerTimer">00h:00m:00s</div>
                        <div class="banner-subtitle" id="bannerSubtitle">Active Clan Battle</div>
                    </div>
                    <div id="clanCardsList"></div>
                    
                    <div class="leaderboard-footer" id="leaderboardFooter">
                        <div class="page-select-bg" id="pageSelectBg">
                            <div class="page-arrow arrow-left" id="prevPageBtn" ></div>
                            <span class="page-number-text" id="pageNumberDisplay">1</span>
                            <div class="page-arrow arrow-right" id="nextPageBtn" ></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="country-toggle-arrow" id="countryToggleArrow"></div>

            <div class="country-filter-panel" id="countryFilterPanel">
                <div class="country-filter-title">COUNTRY</div>
                <div class="country-list-scroll" id="countryListScroll"></div>
            </div>
            
            <div class="close-btn" onclick="location.href='index.html'" ></div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://rough-pine-d90f.ps99clans.workers.dev";
        let pointsClanData = [];
        let gemsClanData = [];
        let currentMode = localStorage.getItem("clanLeaderboardMode") || "points"; 
        let searchQuery = "";
        let selectedCountries = []; 
        let currentPage = 1;
        const itemsPerPage = 100;

        const COUNTRY_LIST = [
            { code: "US", name: "United States" },
            { code: "CZ", name: "Czechia" },
            { code: "SK", name: "Slovakia" },
            { code: "PL", name: "Poland" },
            { code: "DE", name: "Germany" },
            { code: "GB", name: "United Kingdom" },
            { code: "FR", name: "France" },
            { code: "CA", name: "Canada" },
            { code: "AU", name: "Australia" },
            { code: "BR", name: "Brazil" },
            { code: "JP", name: "Japan" },
            { code: "KR", name: "South Korea" },
            { code: "NL", name: "Netherlands" },
            { code: "SE", name: "Sweden" },
            { code: "ES", name: "Spain" },
            { code: "IT", name: "Italy" },
            { code: "UA", name: "Ukraine" },
            { code: "MX", name: "Mexico" },
            { code: "AT", name: "Austria" },
            { code: "CH", name: "Switzerland" },
            { code: "NO", name: "Norway" },
            { code: "FI", name: "Finland" }
        ];
        
        const descriptionCache = JSON.parse(localStorage.getItem("clanDescCache")) || {};
        let timerInterval = null;

        function autoFitScreen() {
            const scaler = document.getElementById("appScaler");
            if (!scaler) return;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            if (winW >= 1150) {
                document.body.classList.remove("is-mobile");
                scaler.style.transform = "none";
                return;
            }

            document.body.classList.add("is-mobile");
            const requiredW = 1120;
            const requiredH = 650; // nebo výška pro danou stránku

            const scaleX = winW / requiredW;
            const scaleY = winH / requiredH;

            const scale = Math.min(scaleX, scaleY) * 0.92;
    
            scaler.style.transform = `scale(${scale}) translateY(-25px)`;
        }

        window.addEventListener("resize", autoFitScreen);

        const descObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const row = entry.target;
                    const clanName = row.dataset.clanName;
                    const descId = row.dataset.descId;
                    if (clanName && descId) {
                        fetchClanDescription(clanName, descId);
                    }
                    observer.unobserve(row);
                }
            });
        }, {
            root: document.getElementById('leaderboardList'),
            rootMargin: '100px 0px',
            threshold: 0.01
        });

        function formatNumber(num) {
            if (num === undefined || num === null) return "0";
            const formatWithSuffix = (value, suffix) => {
                if (value < 10) return (Math.floor(value * 100) / 100).toFixed(2) + suffix;
                if (value < 100) return (Math.floor(value * 10) / 10).toFixed(1) + suffix;
                return Math.floor(value) + suffix;
            };
            if (num >= 1e12) return formatWithSuffix(num / 1e12, "t"); 
            if (num >= 1e9) return formatWithSuffix(num / 1e9, "b");
            if (num >= 1e6) return formatWithSuffix(num / 1e6, "m");
            if (num >= 1e3) return formatWithSuffix(num / 1e3, "k");
            return num.toString();
        }

        function getTwemojiUrl(countryCode) {
            if (!countryCode || countryCode.length !== 2) return "https://twemoji.maxcdn.com/v/14.0.2/svg/1f1fa-1f1f8.svg";
            const codePoints = countryCode.toUpperCase().split('').map(char => 0x1F1E6 + char.charCodeAt(0) - 65);
            return `https://twemoji.maxcdn.com/v/14.0.2/svg/${codePoints[0].toString(16)}-${codePoints[1].toString(16)}.svg`;
        }

        function getClanIconUrl(iconAsset) {
            if (!iconAsset) return "https://placehold.co/90x90/ffffff/000000?text=Clan";
            const match = iconAsset.match(/\d+/);
            if (match) {
                return `https://ps99.biggamesapi.io/image/${match[0]}`;
            }
            return "https://placehold.co/90x90/ffffff/000000?text=Clan";
        }

        function generateFallbackData() {
            const fallback = [];
            const countries = ["US", "CZ", "SK", "PL", "DE", "GB", "FR", "CA", "AU", "BR", "JP", "KR", "NL", "SE", "ES", "IT", "UA", "MX", "AT", "CH", "NO", "FI"];
            for (let i = 1; i <= 1000; i++) {
                fallback.push({
                    Name: `FALL${i}`,
                    Points: Math.floor(10000000000 / i),
                    DepositedDiamonds: Math.floor(500000000000 / i),
                    Members: Math.max(1, Math.min(74, Math.floor(74 - (i % 70)))),
                    MemberCapacity: 75,
                    CountryCode: countries[i % countries.length],
                    Icon: "rbxassetid://1372728282"
                });
            }
            return fallback;
        }

        function adjustDescSize(el) {
            if (!el) return;
            
            const cleanText = el.textContent.trim();
            if (cleanText === "..." || cleanText === "") {
                el.style.fontSize = "42px";
                el.style.top = "56px";
                return;
            }

            let currentSize = 42;
            el.style.fontSize = currentSize + "px";
            el.style.top = "56px";
            el.style.whiteSpace = "normal";

            while ((el.scrollWidth > 400 || el.scrollHeight > 56) && currentSize > 14) {
                currentSize--;
                el.style.fontSize = currentSize + "px";
                
                if (el.scrollHeight > 56 && currentSize > 28) {
                    el.style.whiteSpace = "nowrap";
                }
            }
        }

        async function fetchClanDescription(clanName, elementId) {
            const now = Date.now();
            const cached = descriptionCache[clanName];
            const cacheDuration = 12 * 60 * 60 * 1000;

            if (cached && typeof cached === 'object' && cached.desc !== undefined && cached.timestamp && (now - cached.timestamp < cacheDuration)) {
                const el = document.getElementById(elementId);
                if (el) { el.textContent = cached.desc; adjustDescSize(el); }
                return;
            }
            
            try {
                const res = await fetch(`${WORKER_URL}/clan/${clanName}`);
                const data = await res.json();
                if (data && data.status === "ok" && data.data && data.data.Desc) {
                    const cleanDesc = data.data.Desc.replace(/[\r\n\t]+/g, ' ').trim();
                    
                    descriptionCache[clanName] = {
                        desc: cleanDesc,
                        timestamp: now
                    };
                    localStorage.setItem("clanDescCache", JSON.stringify(descriptionCache));
                    
                    const el = document.getElementById(elementId);
                    if (el) { el.textContent = cleanDesc; adjustDescSize(el); }
                }
            } catch (e) { 
                if (cached) {
                    const el = document.getElementById(elementId);
                    const fallbackDesc = typeof cached === 'object' ? cached.desc : cached;
                    if (el) { el.textContent = fallbackDesc; adjustDescSize(el); }
                }
            }
        }

        async function fetchActiveClanBattle() {
            try {
                const res = await fetch(`${WORKER_URL}/activeClanBattle`);
                const data = await res.json();
                if (data && data.status === "ok" && data.data) {
                    const battle = data.data;
                    
                    let title = "Clan Battle";
                    if (battle.configData && battle.configData.Title) {
                        title = battle.configData.Title;
                    } else if (battle.Title) {
                        title = battle.Title;
                    } else if (battle.Name) {
                        title = battle.Name;
                    } else if (battle.configName) {
                        title = battle.configName.replace(/([A-Z])/g, ' $1').trim();
                    }

                    let finishTime = 0;
                    if (battle.configData && battle.configData.FinishTime) {
                        finishTime = battle.configData.FinishTime;
                    } else if (battle.FinishTime) {
                        finishTime = battle.FinishTime;
                    }

                    const bannerTitle = document.getElementById("bannerTitle");
                    if (bannerTitle) {
                        bannerTitle.textContent = title;
                    }

                    startTimer(finishTime);
                }
            } catch (err) {
                console.error("Chyba při načítání dat o bitvě", err);
            }
        }

        function startTimer(finishTimeSeconds) {
            if (timerInterval) clearInterval(timerInterval);
            
            const timerEl = document.getElementById("bannerTimer");
            const subtitleEl = document.getElementById("bannerSubtitle");
            if (!timerEl) return;

            if (!finishTimeSeconds) {
                timerEl.textContent = "00h:00m:00s";
                if (subtitleEl) subtitleEl.textContent = "No Active Battle";
                return;
            }

            const finishTimeMs = finishTimeSeconds * 1000;

            function update() {
                const now = Date.now();
                const diff = finishTimeMs - now;

                if (diff <= 0) {
                    timerEl.textContent = "ENDED!";
                    if (subtitleEl) subtitleEl.textContent = "Battle Ended";
                    clearInterval(timerInterval);
                    return;
                }

                const seconds = Math.floor((diff / 1000) % 60);
                const minutes = Math.floor((diff / (1000 * 60)) % 60);
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));

                let timeStr = "";
                if (days > 0) {
                    timeStr += `${days}d:`;
                }
                timeStr += `${hours.toString().padStart(2, '0')}h:`;
                timeStr += `${minutes.toString().padStart(2, '0')}m:`;
                timeStr += `${seconds.toString().padStart(2, '0')}s`;

                timerEl.textContent = timeStr;
            }

            update();
            timerInterval = setInterval(update, 1000);
        }

        async function fetchLeaderboardData(isSilent = false) {
            const list = document.getElementById("clanCardsList");
            if (!isSilent && list) {
                list.innerHTML = `<div class="leaderboard-loading">Loading...</div>`;
            }
            try {
                const resPoints = await fetch(`${WORKER_URL}/clans?page=1&pageSize=1000&sort=Points&sortOrder=desc`);
                const dataPoints = await resPoints.json();
                pointsClanData = (dataPoints && dataPoints.status === "ok") ? dataPoints.data : generateFallbackData();

                const resGems = await fetch(`${WORKER_URL}/clans?page=1&pageSize=1000&sort=DepositedDiamonds&sortOrder=desc`);
                const dataGems = await resGems.json();
                gemsClanData = (dataGems && dataGems.status === "ok") ? dataGems.data : generateFallbackData();
            } catch (err) {
                if (!isSilent) {
                    pointsClanData = generateFallbackData();
                    gemsClanData = generateFallbackData();
                }
            }
            renderLeaderboard();
            if (typeof fetchActiveClanBattle === "function") { fetchActiveClanBattle(); }
        }

        function renderLeaderboard() {
            const list = document.getElementById("clanCardsList");
            const banner = document.getElementById("clanWarBanner");
            const footerEl = document.getElementById("leaderboardFooter");
            const pageText = document.getElementById("pageNumberDisplay");
            
            if (!list || !banner || !footerEl) return;
            
            const savedScrollTop = document.getElementById("leaderboardList").scrollTop;
            
            descObserver.disconnect();
            list.innerHTML = "";

            let sourceData = (currentMode === "points") ? pointsClanData : gemsClanData;
            sourceData = sourceData.map((clan, idx) => ({ ...clan, _originalRank: idx + 1 }));

            if (searchQuery.trim() !== "") {
                sourceData = sourceData.filter(clan => clan.Name && clan.Name.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            if (selectedCountries.length > 0) {
                sourceData = sourceData.filter(clan => clan.CountryCode && selectedCountries.includes(clan.CountryCode.toUpperCase()));
            }

            const isPoints = (currentMode === "points");
            banner.style.display = isPoints ? "block" : "none";

            if (isPoints && sourceData.length > itemsPerPage) {
                footerEl.style.display = "block";
            } else {
                footerEl.style.display = "none";
            }
            
            const pageData = isPoints ? sourceData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage) : sourceData.slice(0, 100);
            if (isPoints && pageText) pageText.textContent = currentPage;

            pageData.forEach((clan) => {
                const absoluteRank = clan._originalRank;
                const row = document.createElement("div");
                row.className = "clan-row";
                
                row.dataset.clanName = clan.Name;
                const descElementId = `desc-${currentMode}-${absoluteRank}`;
                row.dataset.descId = descElementId;

                row.onclick = () => {
                    location.href = `clan-detail.html?name=${encodeURIComponent(clan.Name)}`;
                };

                const formattedPoints = formatNumber(clan.Points);
                const formattedGems = formatNumber(clan.DepositedDiamonds || clan.Diamonds || 0);
                
                const rawMembers = clan.Members !== undefined ? clan.Members : 0;
                const mCount = rawMembers + 1;
                const mCap = clan.MemberCapacity !== undefined ? clan.MemberCapacity : 75;
                
                const rankColor = (absoluteRank === 1) ? "#8AFCED" : "#FFFFFF";
                const flagUrl = getTwemojiUrl(clan.CountryCode);
                const clanIconUrl = getClanIconUrl(clan.Icon);

                row.innerHTML = `
                    <div class="clan-rank" style="color: ${rankColor};">#${absoluteRank}</div>
                    <img class="clan-icon" src="${clanIconUrl}" onerror="this.onerror=null; this.src='https://placehold.co/90x90/ffffff/000000?text=Clan';" draggable="false">
                    <img class="clan-flag" src="${flagUrl}" draggable="false">
                    <div class="clan-name">[${clan.Name}]</div>
                    <div class="clan-desc" id="${descElementId}">...</div>
                    <div class="clan-points">${formattedPoints}</div>
                    <div class="clan-members" data-text="${mCount}/${mCap}">${mCount}/${mCap}</div>
                    <div class="clan-diamonds-wrapper">
                        <div class="clan-gem-icon"></div>
                        <div class="clan-diamonds">${formattedGems}</div>
                    </div>
                `;
                
                list.appendChild(row);

                descObserver.observe(row);
            });

            document.getElementById("leaderboardList").scrollTop = savedScrollTop;
        }

        function initCountryFilterUI() {
            const container = document.getElementById("countryListScroll");
            if (!container) return;
            container.innerHTML = "";

            COUNTRY_LIST.forEach(item => {
                const btn = document.createElement("div");
                const isActive = selectedCountries.includes(item.code);
                btn.className = `country-item-btn ${isActive ? 'is-active' : ''}`;
                
                const flagUrl = getTwemojiUrl(item.code);
                const flagImg = `<img class="country-item-flag" src="${flagUrl}" draggable="false">`;

                btn.innerHTML = `
                    ${flagImg}
                    <span class="country-item-name">${item.name}</span>
                `;

                btn.onclick = () => {
                    if (selectedCountries.includes(item.code)) {
                        selectedCountries = selectedCountries.filter(c => c !== item.code);
                    } else {
                        selectedCountries.push(item.code);
                    }
                    currentPage = 1;
                    initCountryFilterUI(); 
                    renderLeaderboard();
                };

                container.appendChild(btn);
            });
        }

        const arrowToggle = document.getElementById("countryToggleArrow");
        const panelFilter = document.getElementById("countryFilterPanel");

        if (arrowToggle && panelFilter) {
            arrowToggle.onclick = () => {
                arrowToggle.classList.toggle("is-open");
                panelFilter.classList.toggle("is-open");
            };
        }

        function updateModeVisuals() {
            const btnPoints = document.getElementById("sortPoints");
            const btnGems = document.getElementById("sortGems");
            if (currentMode === "points") {
                btnPoints.classList.remove("is-inactive");
                btnGems.classList.remove("is-active");
            } else {
                btnPoints.classList.add("is-inactive");
                btnGems.classList.add("is-active");
            }
        }

        const btnPoints = document.getElementById("sortPoints");
        const btnGems = document.getElementById("sortGems");
        const inputSearch = document.getElementById("clanSearch");

        if (btnPoints && btnGems && inputSearch) {
            btnPoints.addEventListener("click", () => {
                currentMode = "points";
                localStorage.setItem("clanLeaderboardMode", "points");
                updateModeVisuals();
                currentPage = 1; 
                renderLeaderboard();
            });

            btnGems.addEventListener("click", () => {
                currentMode = "gems";
                localStorage.setItem("clanLeaderboardMode", "gems");
                updateModeVisuals();
                renderLeaderboard();
            });

            inputSearch.addEventListener("input", (e) => {
                searchQuery = e.target.value;
                currentPage = 1; 
                renderLeaderboard();
            });
        }

        const prevBtn = document.getElementById("prevPageBtn");
        const nextBtn = document.getElementById("nextPageBtn");

        if (prevBtn && nextBtn) {
            prevBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentPage > 1) { currentPage--; renderLeaderboard(); }
            });
            nextBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentPage < 10) { currentPage++; renderLeaderboard(); }
            });
        }

        setInterval(() => {
            fetchLeaderboardData(true);
        }, 60000);

        window.addEventListener('DOMContentLoaded', () => {
            autoFitScreen();
            updateModeVisuals();
            initCountryFilterUI();
            fetchLeaderboardData(false);
            fetchActiveClanBattle();
        });

        const footer = document.getElementById('leaderboardFooter');
        const arrowL = document.getElementById('prevPageBtn');
        const arrowR = document.getElementById('nextPageBtn');

        if (arrowL && footer) {
            arrowL.addEventListener('mouseenter', () => footer.classList.add('hover-left'));
            arrowL.addEventListener('mouseleave', () => { footer.classList.remove('hover-left', 'active-left'); });
            arrowL.addEventListener('mousedown', () => footer.classList.add('active-left'));
            arrowL.addEventListener('mouseup', () => footer.classList.remove('active-left'));
        }
        if (arrowR && footer) {
            arrowR.addEventListener('mouseenter', () => footer.classList.add('hover-right'));
            arrowR.addEventListener('mouseleave', () => { footer.classList.remove('hover-right', 'active-right'); });
            arrowR.addEventListener('mousedown', () => footer.classList.add('active-right'));
            arrowR.addEventListener('mouseup', () => footer.classList.remove('active-right'));
        }

        document.getElementById('tab-topclans').addEventListener('wheel', (e) => {
            const container = document.getElementById('leaderboardList');
            if (container) container.scrollTop += e.deltaY;
        });
    </script>
</body>
</html>
