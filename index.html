<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS99 Clans - Main Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="preload" as="image" href="images/main-menu.png">
    <link rel="preload" as="image" href="images/ezgif-com-gif-maker.gif">
    <link rel="preload" as="image" href="images/web-info.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif !important;
            font-weight: 600;
            user-select: none;
        }

        html, body {
            width: 100vw;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #89b3f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-scaler {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
        }

        .game-window {
            position: relative;
            display: inline-block;
            width: 1110px;
            height: 570px;
            overflow: visible;
        }

        .menu-bg {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.35));
        }

        .clans-logo {
            position: absolute;
            left: -36px;
            top: -69px;
            width: 315px;
            height: 117px;
            background: url("images/clans-logo.png") no-repeat center center;
            background-size: 100% 100%;
            z-index: 998;
        }

        .close-btn {
            position: absolute;
            left: 1044px; 
            top: -30px; 
            width: 72px;  
            height: 73px; 
            background: url("images/X.png") no-repeat center center;
            background-size: 100% 100%;
            cursor: pointer;
            z-index: 999;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.35));
            transition: all 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .close-btn:hover:not(:active) { left: 1042px; top: -34px; width: 76px; height: 77px; }
        .close-btn:active { background-image: url("images/X-clicked.png"); left: 1047px; top: -29px; width: 66px; height: 67px; }

        .menu-btn {
            position: absolute;
            left: 14px;
            width: 306px;
            height: 84px;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 900;
            background-image: url("images/grey.png");
            transition: all 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .menu-btn:hover:not(:active) { left: 11px; width: 315px; height: 88px; z-index: 920; }
        .menu-btn:active { background-image: url("images/grey-clicked.png"); left: 20px; width: 294px; height: 78px; z-index: 900; }

        .menu-btn.is-active { background-image: url("images/selected.png"); }
        .menu-btn.is-active:active { background-image: url("images/selected-clicked.png"); left: 20px; width: 294px; height: 78px; z-index: 900; }

        .btn-clans { top: 34px; }
        .btn-topclans { top: 124px; }
        .btn-people { top: 214px; }
        .btn-search { top: 304px; }

        .menu-text {
            position: absolute;
            pointer-events: none;
            z-index: 950;
            transform-origin: center center;
            transition: transform 0.044s cubic-bezier(0.1, 0.9, 0.2, 1), top 0.044s cubic-bezier(0.1, 0.9, 0.2, 1), left 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .text-clans { left: 100px; top: 52px; }
        .text-topclans { left: 53px; top: 140px; }
        .text-people { left: 76px; top: 230px; }
        .text-search { left: 88px; top: 322px; }

        .btn-clans:hover:not(:active) ~ .text-clans { transform: scale(1.06) translate(-3px, 2px); }
        .btn-topclans:hover:not(:active) ~ .text-topclans { transform: scale(1.06) translate(-3px, 2px); }
        .btn-people:hover:not(:active) ~ .text-people { transform: scale(1.06) translate(-3px, 2px); }
        .btn-search:hover:not(:active) ~ .text-search { transform: scale(1.06) translate(-3px, 2px); }

        .btn-clans:hover:not(:active) ~ .btn-topclans { top: 128px; }
        .btn-clans:hover:not(:active) ~ .text-topclans { top: 144px; }
        .btn-clans:hover:not(:active) ~ .btn-people { top: 218px; }
        .btn-clans:hover:not(:active) ~ .text-people { top: 234px; }
        .btn-clans:hover:not(:active) ~ .btn-search { top: 308px; }
        .btn-clans:hover:not(:active) ~ .text-search { top: 326px; }

        .btn-topclans:hover:not(:active) ~ .btn-people { top: 218px; }
        .btn-topclans:hover:not(:active) ~ .text-people { top: 234px; }
        .btn-topclans:hover:not(:active) ~ .btn-search { top: 308px; }
        .btn-topclans:hover:not(:active) ~ .text-search { top: 326px; }

        .btn-people:hover:not(:active) ~ .btn-search { top: 308px; }
        .btn-people:hover:not(:active) ~ .text-search { top: 326px; }

        .tab-content {
            position: absolute;
            left: 350px;
            top: 40px;
            width: 710px;
            height: 490px;
            z-index: 850;
        }

        .clans-title {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: center;
            top: -11px;
            font-size: 80px;
            color: #2A2B31;
            font-weight: 800;
        }

        .clans-gif { position: absolute; left: -2px; top: 83px; width: 235px; height: 235px; pointer-events: none; }
        .clans-info { position: absolute; left: 231px; top: 97px; image-rendering: pixelated; }

        .sub-btn {
            position: absolute;
            width: 337px;  
            height: 111px; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 900;
            top: 387px; 
            transition: all 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .btn-sub-topclans { left: 7px; background-image: url("images/topclans.png"); }
        .btn-sub-search { left: 369px; background-image: url("images/people-index.png"); }

        .btn-sub-topclans:hover:not(:active) { left: 3px; top: 384px; width: 345px; height: 117px; z-index: 920; }
        .btn-sub-search:hover:not(:active) { left: 365px; top: 384px; width: 345px; height: 117px; z-index: 920; }
        
        .btn-sub-topclans:active { background-image: url("images/topclans-selected.png"); left: 13px; top: 391px; width: 325px; height: 103px; z-index: 900; }
        .btn-sub-search:active { background-image: url("images/people-index-selected.png"); left: 375px; top: 391px; width: 325px; height: 103px; z-index: 900; }

        /* MOBILNÍ ORIENTATION POPUP */
        .orientation-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .orientation-popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .orientation-popup-card {
            position: relative;
            width: 88%;
            max-width: 380px;
            background: #FFFFFF;
            border: 5px solid #000000;
            border-radius: 20px;
            padding: 25px 20px 20px 20px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.85);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .orientation-popup-overlay.show .orientation-popup-card {
            transform: scale(1);
        }

        .popup-close-x {
            position: absolute;
            right: -14px;
            top: -14px;
            width: 44px;
            height: 44px;
            background: url("images/X.png") no-repeat center center;
            background-size: 100% 100%;
            cursor: pointer;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.3));
            transition: transform 0.1s ease;
        }

        .popup-close-x:active {
            background-image: url("images/X-clicked.png");
            transform: scale(0.9);
        }

        .popup-icon-container {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup-icon-svg {
            width: 100%;
            height: 100%;
            fill: #3b82f6;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        @keyframes rotatePhone {
            0%, 15% { transform: rotate(0deg); }
            50%, 65% { transform: rotate(-90deg); }
            85%, 100% { transform: rotate(0deg); }
        }

        .popup-title {
            font-size: 24px;
            color: #FFFFFF;
            -webkit-text-stroke: 4.5px #000000;
            paint-order: stroke fill;
            stroke-linejoin: round;
            font-weight: 800 !important;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .popup-text {
            font-size: 16px;
            color: #2A2B31;
            font-weight: 700;
            margin-bottom: 18px;
            line-height: 1.35;
        }

        .popup-rotate-btn {
            width: 100%;
            padding: 12px 0;
            background: linear-gradient(180deg, #4292FF 0%, #176BFF 100%);
            border: 3.5px solid #000000;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 800 !important;
            -webkit-text-stroke: 3px #000000;
            paint-order: stroke fill;
            cursor: pointer;
            box-shadow: 0 4px 0 #000000;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .popup-rotate-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000000;
        }
    </style>
</head>
<body>

    <div class="app-scaler" id="appScaler">
        <div class="game-window">
            <img class="menu-bg" src="images/main-menu.png" draggable="false">
            
            <div class="clans-logo"></div>
            
            <div class="menu-btn btn-clans is-active" onclick="location.href='index.html'" ></div>
            <div class="menu-btn btn-topclans" onclick="location.href='topclans.html'" ></div>
            <div class="menu-btn btn-people" onclick="location.href='leagues.html'" ></div>
            <div class="menu-btn btn-search" onclick="location.href='people.html'" ></div>
            
            <img class="menu-text text-clans" src="images/text-Clans.png" draggable="false">
            <img class="menu-text text-topclans" src="images/text-Top Clans.png" draggable="false">
            <img class="menu-text text-people" src="images/leagues-text.png" draggable="false">
            <img class="menu-text text-search" src="images/text-People.png" draggable="false">
            
            <div class="tab-content">
                <div class="clans-title">PS99 Clan List!</div>
                <img class="clans-gif" src="images/ezgif.com-gif-maker.gif" draggable="false">
                <img class="clans-info" src="images/web-info.png" draggable="false">
                
                <div class="sub-btn btn-sub-topclans" onclick="location.href='topclans.html'" ></div>
                <div class="sub-btn btn-sub-search" onclick="location.href='people.html'" ></div>
            </div>
        </div>
    </div>

    <div class="orientation-popup-overlay" id="orientationPopup">
        <div class="orientation-popup-card">
            <div class="popup-close-x" id="popupCloseBtn"></div>
            
            <div class="popup-icon-container">
                <svg class="popup-icon-svg" viewBox="0 0 24 24">
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                </svg>
            </div>
            
            <div class="popup-title">Rotate Phone</div>
            <div class="popup-text">Rotate your device horizontally for the best experience!</div>
            
            <button class="popup-rotate-btn" id="popupRotateActionBtn">ROTATE SCREEN</button>
        </div>
    </div>

    <script>
        function autoFitScreen() {
            const scaler = document.getElementById("appScaler");
            if (!scaler) return;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            if (winW >= 1150) {
                document.body.classList.remove("is-mobile");
                scaler.style.transform = "none";
                hideOrientationPopup();
                return;
            }

            document.body.classList.add("is-mobile");
            const requiredW = 1120;
            const requiredH = 650; 

            const scaleX = winW / requiredW;
            const scaleY = winH / requiredH;

            const scale = Math.min(scaleX, scaleY) * 0.92;
            scaler.style.transform = `scale(${scale})`;

            checkOrientationPopup();
        }

        function checkOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (!popup) return;

            const hasBeenDismissed = sessionStorage.getItem("orientationPopupDismissed") === "true";

            const isMobile = window.innerWidth < 1150;
            const isPortrait = window.innerHeight > window.innerWidth;

            if (isMobile && isPortrait && !hasBeenDismissed) {
                popup.classList.add("show");
            } else {
                popup.classList.remove("show");
            }
        }

        function dismissOrientationPopup() {
            sessionStorage.setItem("orientationPopupDismissed", "true");
            hideOrientationPopup();
        }

        function hideOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (popup) popup.classList.remove("show");
        }

        document.getElementById("popupCloseBtn")?.addEventListener("click", () => {
            dismissOrientationPopup();
        });

        document.getElementById("popupRotateActionBtn")?.addEventListener("click", () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(() => {});
            }
            dismissOrientationPopup();
        });

        window.addEventListener("resize", autoFitScreen);
        window.addEventListener("orientationchange", autoFitScreen);
        window.addEventListener('DOMContentLoaded', autoFitScreen);
    </script>
</body>
</html>
