<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS99 Clans - Main Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="preload" as="image" href="https://i.postimg.cc/sfG6nXsc/main-menu.png">
    <link rel="preload" as="image" href="https://i.postimg.cc/5NzhFyD8/ezgif-com-gif-maker.gif">
    <link rel="preload" as="image" href="https://i.postimg.cc/PfSxF3xk/web-info.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif !important;
            font-weight: 600;
            user-select: none;
        }

        body {
            background-color: #89b3f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-window {
            position: relative;
            display: inline-block;
            overflow: visible;
        }

        .menu-bg {
            display: block;
            width: auto;
            height: auto;
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.35));
        }

        .clans-logo {
            position: absolute;
            left: -36px;
            top: -69px;
            width: 315px;
            height: 117px;
            background: url("https://i.postimg.cc/PfW18xLb/clans-logo.png") no-repeat center center;
            background-size: 100% 100%;
            z-index: 998;
        }

        .close-btn {
            position: absolute;
            left: 1044px; 
            top: -30px; 
            width: 72px;  
            height: 73px; 
            background: url("https://i.postimg.cc/ZnsJsPBt/X.png") no-repeat center center;
            background-size: 100% 100%;
            cursor: pointer;
            z-index: 999;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.35));
            transition: all 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .close-btn:hover:not(:active) { left: 1042px; top: -34px; width: 76px; height: 77px; }
        .close-btn:active { background-image: url("https://i.postimg.cc/Dz424SzQ/X-clicked.png"); left: 1047px; top: -29px; width: 66px; height: 67px; }

        .menu-btn {
            position: absolute;
            left: 14px;
            width: 306px;
            height: 84px;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 900;
            background-image: url("https://i.postimg.cc/MGrXBkwN/grey.png");
            transition: all 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .menu-btn:hover:not(:active) { left: 11px; width: 315px; height: 88px; z-index: 920; }
        .menu-btn:active { background-image: url("https://i.postimg.cc/br1v4snw/grey-clicked.png"); left: 20px; width: 294px; height: 78px; z-index: 900; }

        .menu-btn.is-active { background-image: url("https://i.postimg.cc/JhX56QnL/selected.png"); }
        .menu-btn.is-active:active { background-image: url("https://i.postimg.cc/bNXDLjnT/selected-clicked.png"); left: 20px; width: 294px; height: 78px; z-index: 900; }

        .btn-clans { top: 34px; }
        .btn-topclans { top: 124px; }
        .btn-people { top: 214px; }
        .btn-search { top: 304px; }

        .menu-text {
            position: absolute;
            pointer-events: none;
            z-index: 950;
            transform-origin: center center;
            transition: transform 0.044s cubic-bezier(0.1, 0.9, 0.2, 1), top 0.044s cubic-bezier(0.1, 0.9, 0.2, 1), left 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .text-clans { left: 100px; top: 52px; }
        .text-topclans { left: 53px; top: 140px; }
        .text-people { left: 76px; top: 230px; }
        .text-search { left: 88px; top: 322px; }

        .btn-clans:hover:not(:active) ~ .text-clans { transform: scale(1.06) translate(-3px, 2px); }
        .btn-topclans:hover:not(:active) ~ .text-topclans { transform: scale(1.06) translate(-3px, 2px); }
        .btn-people:hover:not(:active) ~ .text-people { transform: scale(1.06) translate(-3px, 2px); }
        .btn-search:hover:not(:active) ~ .text-search { transform: scale(1.06) translate(-3px, 2px); }

        .btn-clans:hover:not(:active) ~ .btn-topclans { top: 128px; }
        .btn-clans:hover:not(:active) ~ .text-topclans { top: 144px; }
        .btn-clans:hover:not(:active) ~ .btn-people { top: 218px; }
        .btn-clans:hover:not(:active) ~ .text-people { top: 234px; }
        .btn-clans:hover:not(:active) ~ .btn-search { top: 308px; }
        .btn-clans:hover:not(:active) ~ .text-search { top: 326px; }

        .btn-topclans:hover:not(:active) ~ .btn-people { top: 218px; }
        .btn-topclans:hover:not(:active) ~ .text-people { top: 234px; }
        .btn-topclans:hover:not(:active) ~ .btn-search { top: 308px; }
        .btn-topclans:hover:not(:active) ~ .text-search { top: 326px; }

        .btn-people:hover:not(:active) ~ .btn-search { top: 308px; }
        .btn-people:hover:not(:active) ~ .text-search { top: 326px; }

        .tab-content {
            position: absolute;
            left: 350px;
            top: 40px;
            width: 710px;
            height: 490px;
            z-index: 850;
        }

        .clans-title {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: center;
            top: -11px;
            font-size: 80px;
            color: #2A2B31;
            font-weight: 800;
        }

        .clans-gif { position: absolute; left: -2px; top: 83px; width: 235px; height: 235px; pointer-events: none; }
        .clans-info { position: absolute; left: 231px; top: 97px; image-rendering: pixelated; }

        .sub-btn {
            position: absolute;
            width: 337px;  
            height: 111px; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 900;
            top: 387px; 
            transition: all 0.044s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .btn-sub-topclans { left: 7px; background-image: url("https://i.postimg.cc/t44Cdhyn/topclans.png"); }
        .btn-sub-search { left: 369px; background-image: url("https://i.postimg.cc/MT2SLRkn/search.png"); }

        .btn-sub-topclans:hover:not(:active) { left: 3px; top: 384px; width: 345px; height: 117px; z-index: 920; }
        .btn-sub-search:hover:not(:active) { left: 365px; top: 384px; width: 345px; height: 117px; z-index: 920; }
        
        .btn-sub-topclans:active { background-image: url("https://i.postimg.cc/3Nh3kGnR/topclans-selected.png"); left: 13px; top: 391px; width: 325px; height: 103px; z-index: 900; }
        .btn-sub-search:active { background-image: url("https://i.postimg.cc/tRzjrYB7/search-selected.png"); left: 375px; top: 391px; width: 325px; height: 103px; z-index: 900; }
    </style>
</head>
<body>

    <div class="game-window">
        <img class="menu-bg" src="https://i.postimg.cc/sfG6nXsc/main-menu.png" draggable="false">
        
        <div class="clans-logo"></div>
        
        <div class="menu-btn btn-clans is-active" onclick="location.href='index.html'" ></div>
        <div class="menu-btn btn-topclans" onclick="location.href='topclans.html'" ></div>
        <div class="menu-btn btn-people" onclick="location.href='leagues.html'" ></div>
        <div class="menu-btn btn-search" onclick="location.href='people.html'" ></div>
        
        <img class="menu-text text-clans" src="https://i.postimg.cc/7YwkVBKh/text-Clans.png" draggable="false">
        <img class="menu-text text-topclans" src="https://i.postimg.cc/bv7X2LGJ/text-Top-Clans.png" draggable="false">
        <img class="menu-text text-people" src="https://i.postimg.cc/vBjLqZp7/leagues-text.png" draggable="false">
        <img class="menu-text text-search" src="https://i.postimg.cc/9FW6TDfB/text-People.png" draggable="false">
        
        <div class="tab-content">
            <div class="clans-title">PS99 Clan List!</div>
            <img class="clans-gif" src="https://i.postimg.cc/5NzhFyD8/ezgif-com-gif-maker.gif" draggable="false">
            <img class="clans-info" src="https://i.postimg.cc/PfSxF3xk/web-info.png" draggable="false">
            
            <div class="sub-btn btn-sub-topclans" onclick="location.href='topclans.html'" ></div>
            <div class="sub-btn btn-sub-search" onclick="location.href='search.html'" ></div>
        </div>
        
        <div class="close-btn" onclick="console.log('Menu zavřeno!')" ></div>
    </div>

</body>
</html>
