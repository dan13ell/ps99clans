        html, body {
            width: 100vw;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overscroll-behavior: none !important;
            touch-action: none;
        }

        .members-scroll-area {
            touch-action: pan-y !important;
            overscroll-behavior: contain !important;
        }

        .orientation-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .orientation-popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .orientation-popup-card {
            position: relative;
            width: 88%;
            max-width: 380px;
            background: #FFFFFF;
            border: 5px solid #000000;
            border-radius: 20px;
            padding: 25px 20px 20px 20px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.85);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .orientation-popup-overlay.show .orientation-popup-card {
            transform: scale(1);
        }

        .popup-close-x {
            position: absolute;
            right: -14px;
            top: -14px;
            width: 44px;
            height: 44px;
            background: url("images/X.png") no-repeat center center;
            background-size: 100% 100%;
            cursor: pointer;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.3));
            transition: transform 0.1s ease;
        }

        .popup-close-x:active {
            background-image: url("images/X-clicked.png");
            transform: scale(0.9);
        }

        .popup-icon-container {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup-icon-svg {
            width: 100%;
            height: 100%;
            fill: #3b82f6;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        @keyframes rotatePhone {
            0%, 15% { transform: rotate(0deg); }
            50%, 65% { transform: rotate(-90deg); }
            85%, 100% { transform: rotate(0deg); }
        }

        .popup-title {
            font-size: 24px;
            color: #FFFFFF;
            -webkit-text-stroke: 4.5px #000000;
            paint-order: stroke fill;
            stroke-linejoin: round;
            font-weight: 800 !important;

            line-height: 1.35;
        }

            border: 3.5px solid #000000;

            cursor: pointer;

            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .popup-rotate-btn:active {

            box-shadow: 0 1px 0 #000000;
        }

<body>

    <div class="app-scaler" id="appScaler">
        <div class="game-window">
            <img class="menu-bg" src="images/main-menu.png" draggable="false">
            
            <div class="clans-logo"></div>
            
            <div class="menu-btn btn-clans" onclick="location.href='index.html'" ></div>
            <div class="menu-btn btn-topclans is-active" onclick="location.href='topclans.html'" ></div>
            <div class="menu-btn btn-people" onclick="location.href='leagues.html'" ></div>
            <div class="menu-btn btn-search" onclick="location.href='people.html'" ></div>
            
            <img class="menu-text text-clans" src="images/text-Clans.png" draggable="false">
            <img class="menu-text text-topclans" src="images/text-Top-Clans.png" draggable="false">
            <img class="menu-text text-people" src="images/leagues-text.png" draggable="false">
            <img class="menu-text text-search" src="images/text-People.png" draggable="false">
            
            <div class="tab-content" id="tab-clan-profile">
                <div class="custom-back-btn" onclick="location.href='topclans.html'">
                    <img class="custom-back-text" src="images/Back-text.png" draggable="false">
                </div>

                <div class="clan-detail-title" id="clanTitle" data-text="...">...</div>
                <img class="clan-profile-icon-img" id="clanIcon" src="" onerror="this.src='https://placehold.co/175x175/ffffff/000000?text=Clan'">
                <img class="clan-profile-flag-img" id="clanFlag" src="" onerror="this.style.display='none'">
                <div class="clan-profile-desc" id="clanDesc">...</div>
                
                <img class="clan-detail-points-icon" id="clanPointsIcon" src="images/stars.png" >
                <div class="clan-detail-points-text" id="clanPointsText">0</div>
                
                <img class="clan-detail-gems-icon" id="clanGemsIcon" src="images/gems.png" >
                <div class="clan-detail-gems-text" id="clanGemsText">0</div>
                
                <div class="clan-detail-place-text" id="clanPlaceText">Place: Loading...</div>
                
                <div class="clan-status-container" id="clanStatusContainer">
                    <div class="clan-status-message" id="clanStatusMessage">...</div>
                    <div class="clan-status-info" id="clanStatusInfo">...</div>
                </div>
                
                <div class="live-stats-btn" id="liveStatsBtn" ></div>
                <img class="live-stats-text" src="images/live-stats-text.png" draggable="false">
                
                <div class="member-count-icon"></div>
                <div class="detail-members" id="clanMemberCount" data-text="0/75">0/75</div>

                <div class="members-scroll-area" id="membersListContainer">
                </div>

                <div class="clan-profile-container" id="clanProfileContent">
                    <div class="clan-loading" id="loadingState">Loading clan details...</div>
                </div>
            </div>
            
            <div class="close-btn" onclick="location.href='topclans.html'" ></div>
        </div>
    </div>

    <div class="orientation-popup-overlay" id="orientationPopup">
        <div class="orientation-popup-card">
            <div class="popup-close-x" id="popupCloseBtn"></div>
            
            <div class="popup-icon-container">
                <svg class="popup-icon-svg" viewBox="0 0 24 24">
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                </svg>
            </div>
            
            <div class="popup-title">Rotate Phone</div>
            <div class="popup-text">Rotate your device horizontally for the best experience!</div>
            
            <button class="popup-rotate-btn" id="popupRotateActionBtn">ROTATE SCREEN</button>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://rough-pine-d90f.ps99clans.workers.dev";

        function autoFitScreen() {
            const scaler = document.getElementById("appScaler");
            if (!scaler) return;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            if (winW >= 1150) {
                document.body.classList.remove("is-mobile");
                scaler.style.transform = "none";
                hideOrientationPopup();
                return;
            }

            document.body.classList.add("is-mobile");
            const requiredW = 1120;
            const requiredH = 960; 

            const scaleX = winW / requiredW;
            const scaleY = winH / requiredH;

            const scale = Math.min(scaleX, scaleY) * 0.92;
            scaler.style.transform = `scale(${scale})`;

            checkOrientationPopup();
        }

        /* --- LOGIKA ORIENTAČNÍHO POPUPU --- */
        function checkOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (!popup) return;

            const hasBeenDismissed = sessionStorage.getItem("orientationPopupDismissed") === "true";

            const isMobile = window.innerWidth < 1150;
            const isPortrait = window.innerHeight > window.innerWidth;

            if (isMobile && isPortrait && !hasBeenDismissed) {
                popup.classList.add("show");
            } else {
                popup.classList.remove("show");
            }
        }

        function dismissOrientationPopup() {
            sessionStorage.setItem("orientationPopupDismissed", "true");
            hideOrientationPopup();
        }

        function hideOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (popup) popup.classList.remove("show");
        }

        document.getElementById("popupCloseBtn")?.addEventListener("click", () => {
            dismissOrientationPopup();
        });

        document.getElementById("popupRotateActionBtn")?.addEventListener("click", () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(() => {});
            }
            dismissOrientationPopup();
        });

        window.addEventListener("resize", autoFitScreen);
        window.addEventListener("orientationchange", autoFitScreen);

        function formatNumber(num) {
            if (num === undefined || num === null || isNaN(num)) return "0";
            if (num === 0) return "0";
            
            const suffixes = ["", "k", "m", "b", "t"];
            let suffixIndex = 0;
            let val = Math.abs(num);
            
            while (val >= 1000 && suffixIndex < suffixes.length - 1) {
                val /= 1000;
                suffixIndex++;
            }
            
            let formattedVal;
            if (val >= 100) {
                formattedVal = val.toFixed(0);
            } else if (val >= 10) {
                formattedVal = val.toFixed(1);
            } else {
                formattedVal = val.toFixed(2);
            }
            
            if (formattedVal.includes('.')) {
                formattedVal = formattedVal.replace(/\.?0+$/, '');
            }
            
            return (num < 0 ? "-" : "") + formattedVal + suffixes[suffixIndex];
        }

        function timeAgo(timestamp) {
            if (!timestamp) return "";
            const seconds = Math.floor(Date.now() / 1000 - timestamp);
            if (seconds < 60) {
                return `${seconds} ${seconds === 1 ? 'second' : 'seconds'} ago`;
            }
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) {
                return `${minutes} ${minutes === 1 ? 'minute' : 'minutes'} ago`;
            }
            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                return `${hours} ${hours === 1 ? 'hour' : 'hours'} ago`;
            }
            const days = Math.floor(hours / 24);
            return `${days} ${days === 1 ? 'day' : 'days'} ago`;
        }

        function getTwemojiUrl(countryCode) {
            if (!countryCode || countryCode.length !== 2) return "https://twemoji.maxcdn.com/v/14.0.2/svg/1f1fa-1f1f8.svg";
            const codePoints = countryCode.toUpperCase().split('').map(char => 0x1F1E6 + char.charCodeAt(0) - 65);
            return `https://twemoji.maxcdn.com/v/14.0.2/svg/${codePoints[0].toString(16)}-${codePoints[1].toString(16)}.svg`;
        }

        function getClanIconUrl(iconString) {
            if (!iconString) return "https://placehold.co/175x175/ffffff/000000?text=No+Icon";
            const cleanId = iconString.replace("rbxassetid://", "").trim();
            if (!cleanId) return "https://placehold.co/175x175/ffffff/000000?text=No+Icon";
            return `https://ps99.biggamesapi.io/image/${cleanId}`;
        }

        function adjustDescSize(el) {
            if (!el) return;
            let currentSize = 44;
            el.style.fontSize = currentSize + "px";
            while (el.scrollHeight > 60 && currentSize > 12) {
                currentSize--;
                el.style.fontSize = currentSize + "px";
            }
        }

        function sanitizeStatusHTML(rawHtml) {
            if (!rawHtml) return "";
            const temp = document.createElement("div");
            temp.innerHTML = rawHtml;
            
            function processNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.nodeValue;
                }
                if (node.nodeType === Node.ELEMENT_NODE) {
                    const tagName = node.tagName.toLowerCase();
                    let colorStyle = "";
                    if (tagName === "font") {
                        const color = node.getAttribute("color");
                        if (color) {
                            colorStyle = `color: ${color};`;
                        }
                    } else if (node.style && node.style.color) {
                        colorStyle = `color: ${node.style.color};`;
                    }
                    
                    let childrenHtml = "";
                    node.childNodes.forEach(child => {
                        childrenHtml += processNode(child);
                    });
                    
                    if (colorStyle) {
                        return `<span style="${colorStyle} font-size: inherit; font-family: inherit;">${childrenHtml}</span>`;
                    }
                    return childrenHtml;
                }
                return "";
            }
            
            let finalHtml = "";
            temp.childNodes.forEach(node => {
                finalHtml += processNode(node);
            });
            
            return finalHtml.trim() || temp.textContent.trim();
        }

        function hideMemberCountUI() {
            const countIcon = document.querySelector(".member-count-icon");
            const countText = document.getElementById("clanMemberCount");
            const clanIconEl = document.getElementById("clanIcon");
            const flagEl = document.getElementById("clanFlag");
            const descEl = document.getElementById("clanDesc");
            const pointsIconEl = document.getElementById("clanPointsIcon");
            const pointsTextEl = document.getElementById("clanPointsText");
            const gemsIconEl = document.getElementById("clanGemsIcon");
            const gemsTextEl = document.getElementById("clanGemsText");
            const placeTextEl = document.getElementById("clanPlaceText");
            const statusContainerEl = document.getElementById("clanStatusContainer");
            const liveBtn = document.getElementById("liveStatsBtn");
            const liveTxt = document.querySelector(".live-stats-text");

            if (countIcon) countIcon.style.display = "none";
            if (countText) countText.style.display = "none";
            if (clanIconEl) clanIconEl.style.display = "none";
            if (flagEl) flagEl.style.display = "none";
            if (descEl) descEl.style.display = "none";
            if (pointsIconEl) pointsIconEl.style.display = "none";
            if (pointsTextEl) pointsTextEl.style.display = "none";
            if (gemsIconEl) gemsIconEl.style.display = "none";
            if (gemsTextEl) gemsTextEl.style.display = "none";
            if (placeTextEl) placeTextEl.style.display = "none";
            if (statusContainerEl) statusContainerEl.style.display = "none";
            if (liveBtn) liveBtn.style.display = "none";
            if (liveTxt) liveTxt.style.display = "none";
        }

        async function fetchRobloxUserData(userIds) {
            if (!userIds || userIds.length === 0) return { usernames: {}, avatars: {} };
            
            const usernames = {};
            const avatars = {};

            try {
                const userRes = await fetch(`${WORKER_URL}/roblox/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userIds: userIds, excludeBannedUsers: false })
                });
                const userData = await userRes.json();
                if (userData && userData.data) {
                    userData.data.forEach(user => {
                        usernames[user.id] = {
                            name: user.name,
                            displayName: user.displayName
                        };
                    });
                }
            } catch (e) {
                console.warn("Failed to fetch Roblox usernames", e);
            }

            try {
                const avatarRes = await fetch(`${WORKER_URL}/roblox/avatars?userIds=${userIds.join(',')}&size=180x180&format=Png&isCircular=true`);
                const avatarData = await avatarRes.json();
                if (avatarData && avatarData.data) {
                    avatarData.data.forEach(item => {
                        avatars[item.targetId] = item.imageUrl;
                    });
                }
            } catch (e) {
                console.warn("Failed to fetch Roblox avatars", e);
            }

            return { usernames, avatars };
        }

        async function loadClanProfile(isSilent = false) {
            const params = new URLSearchParams(window.location.search);
            const clanName = params.get('name');
            const container = document.getElementById("clanProfileContent");
            const titleEl = document.getElementById("clanTitle");
            const clanIconEl = document.getElementById("clanIcon");
            const flagEl = document.getElementById("clanFlag");
            const descEl = document.getElementById("clanDesc");
            const memberCountEl = document.getElementById("clanMemberCount");
            const listContainer = document.getElementById("membersListContainer");
            const liveBtn = document.getElementById("liveStatsBtn");

            if (!clanName) {
                if (container) {
                    container.innerHTML = `<div class="clan-error">No clan specified!</div>`;
                }
                hideMemberCountUI();
                return;
            }

            if (!isSilent) {
                const loadingEl = document.getElementById("loadingState");
                if (loadingEl) loadingEl.style.display = "block";
            }

            if (liveBtn) {
                liveBtn.setAttribute("onclick", `location.href='live.html?name=${encodeURIComponent(clanName)}'`);
            }

            const savedScrollTop = listContainer ? listContainer.scrollTop : 0;

            try {
                const res = await fetch(`${WORKER_URL}/clan/${clanName}`);
                const responseData = await res.json();

                if (!responseData || responseData.status !== "ok" || !responseData.data) {
                    if (container) {
                        container.innerHTML = `<div class="clan-error">Clan [${clanName}] not found!</div>`;
                    }
                    hideMemberCountUI();
                    return;
                }

                const clan = responseData.data;
                const membersList = clan.Members || [];

                if (titleEl) {
                    const cleanName = `[${clan.Name}]`;
                    titleEl.textContent = cleanName;
                    titleEl.setAttribute("data-text", cleanName);
                }

                if (clanIconEl) {
                    clanIconEl.src = getClanIconUrl(clan.Icon);
                    clanIconEl.style.display = "block";
                }

                if (flagEl && clan.CountryCode) {
                    flagEl.src = getTwemojiUrl(clan.CountryCode);
                    flagEl.style.display = "block";
                }

                if (descEl) {
                    descEl.textContent = clan.Desc || "No description.";
                    descEl.style.display = "flex";
                    adjustDescSize(descEl);
                }

                const diamondMap = {};
                if (clan.DiamondContributions && clan.DiamondContributions.AllTime && Array.isArray(clan.DiamondContributions.AllTime.Data)) {
                    clan.DiamondContributions.AllTime.Data.forEach(item => {
                        diamondMap[item.UserID] = item.Diamonds || 0;
                    });
                } else if (clan.DiamondContributions && Array.isArray(clan.DiamondContributions.Data)) {
                    clan.DiamondContributions.Data.forEach(item => {
                        diamondMap[item.UserID] = item.Diamonds || 0;
                    });
                }

                let activeBattleId = "";
                try {
                    const battleRes = await fetch(`${WORKER_URL}/activeClanBattle`);
                    const battleJson = await battleRes.json();
                    if (battleJson && battleJson.status === "ok" && battleJson.data) {
                        activeBattleId = battleJson.data.Title || battleJson.data.configName || "";
                    }
                } catch (battleError) {
                    console.warn("Could not fetch active clan battle ID", battleError);
                }

                const pointsMap = {};
                let activeWarTotalPoints = 0; 
                let activeWarPlace = null; 
                if (activeBattleId && clan.Battles) {
                    let matchedBattle = null;
                    if (Array.isArray(clan.Battles)) {
                        matchedBattle = clan.Battles.find(b => b.BattleID === activeBattleId);
                    } else if (typeof clan.Battles === 'object') {
                        matchedBattle = clan.Battles[activeBattleId];
                        if (!matchedBattle) {
                            matchedBattle = Object.values(clan.Battles).find(b => b.BattleID === activeBattleId);
                        }
                    }

                    if (matchedBattle) {
                        activeWarTotalPoints = matchedBattle.Points || 0;
                        activeWarPlace = matchedBattle.Place || null; 

                        if (matchedBattle.PointContributions) {
                            matchedBattle.PointContributions.forEach(item => {
                                pointsMap[item.UserID] = item.Points || 0;
                            });
                        }
                    }
                }

                const totalPoints = activeWarTotalPoints || clan.Points || 0;
                const pointsTextEl = document.getElementById("clanPointsText");
                const pointsIconEl = document.getElementById("clanPointsIcon");
                if (pointsTextEl && pointsIconEl) {
                    pointsTextEl.textContent = formatNumber(totalPoints);
                    pointsTextEl.style.display = "block";
                    pointsIconEl.style.display = "block";
                }

                const totalDiamonds = clan.DepositedDiamonds || 0;
                const gemsTextEl = document.getElementById("clanGemsText");
                const gemsIconEl = document.getElementById("clanGemsIcon");
                if (gemsTextEl && gemsIconEl) {
                    gemsTextEl.textContent = formatNumber(totalDiamonds);
                    gemsTextEl.style.display = "block";
                    gemsIconEl.style.display = "block";
                }

                let rankPlace = "N/A";
                if (activeWarPlace !== null && activeWarPlace !== undefined) {
                    rankPlace = `#${activeWarPlace}`;
                } else {
                    try {
                        const listRes = await fetch(`${WORKER_URL}/clans?page=1&pageSize=1000&sort=Points&sortOrder=desc`);
                        const listJson = await listRes.json();
                        if (listJson && listJson.status === "ok" && Array.isArray(listJson.data)) {
                            const foundIndex = listJson.data.findIndex(c => c.Name.toLowerCase() === clan.Name.toLowerCase());
                            if (foundIndex !== -1) {
                                rankPlace = `#${foundIndex + 1}`;
                            }
                        }
                    } catch (e) {
                        console.warn("Could not calculate global rank", e);
                    }
                }
                
                const placeTextEl = document.getElementById("clanPlaceText");
                if (placeTextEl) {
                    placeTextEl.textContent = `Place: ${rankPlace}`;
                    placeTextEl.style.display = "block";
                }

                const statusMsg = clan.Status || "";
                const statusUser = clan.StatusUsername || "";
                const statusTime = clan.StatusTimestamp || 0;

                const statusContainerEl = document.getElementById("clanStatusContainer");
                const statusMsgEl = document.getElementById("clanStatusMessage");
                const statusInfoEl = document.getElementById("clanStatusInfo");

                if (statusMsg && statusContainerEl && statusMsgEl && statusInfoEl) {
                    const sanitizedMessage = sanitizeStatusHTML(statusMsg);
                    statusMsgEl.innerHTML = `"${sanitizedMessage}" - ${statusUser}`;
                    
                    let timeText = "";
                    if (statusTime) {
                        timeText = timeAgo(statusTime);
                    }
                    statusInfoEl.textContent = timeText ? `(${timeText})` : "";
                    
                    statusContainerEl.style.display = "flex";
                } else {
                    if (statusContainerEl) statusContainerEl.style.display = "none";
                }

                const ownerId = clan.Owner;
                
                let ownerMember = membersList.find(m => m.UserID === ownerId);
                if (!ownerMember) {
                    ownerMember = {
                        UserID: ownerId,
                        PermissionLevel: 100
                    };
                } else {
                    ownerMember.PermissionLevel = 100;
                }

                let rawMembersList = membersList.filter(m => m.UserID !== ownerId);

                const mappedMembers = rawMembersList.map(member => {
                    const uid = member.UserID;
                    return {
                        ...member,
                        resolvedPoints: pointsMap[uid] || 0,
                        resolvedDiamonds: diamondMap[uid] || 0
                    };
                });

                const officers = mappedMembers.filter(m => m.PermissionLevel === 90);
                const regularMembers = mappedMembers.filter(m => m.PermissionLevel < 90);

                officers.sort((a, b) => b.resolvedPoints - a.resolvedPoints);
                regularMembers.sort((a, b) => b.resolvedPoints - a.resolvedPoints);

                const leaderPoints = pointsMap[ownerId] || 0;
                const leaderDiamonds = diamondMap[ownerId] || 0;
                const leaderMember = {
                    ...ownerMember,
                    resolvedPoints: leaderPoints,
                    resolvedDiamonds: leaderDiamonds
                };

                const finalMembersList = [leaderMember, ...officers, ...regularMembers];

                const mCount = finalMembersList.length;
                const mCap = clan.MemberCapacity || 75;
                
                if (memberCountEl) {
                    const textValue = `${mCount}/${mCap}`;
                    memberCountEl.setAttribute("data-text", textValue);
                    memberCountEl.textContent = textValue;
                    memberCountEl.style.display = "block";
                }
                const countIcon = document.querySelector(".member-count-icon");
                if (countIcon) countIcon.style.display = "block";

                const userIds = finalMembersList.map(m => m.UserID);
                const { usernames, avatars } = await fetchRobloxUserData(userIds);

                let membersHtml = "";
                finalMembersList.forEach(member => {
                    const uid = member.UserID;
                    const robloxData = usernames[uid] || { name: `Player_${uid}` };
                    const usernameWithAt = `@${robloxData.name}`;
                    const avatarUrl = avatars[uid] || "https://placehold.co/150x150/ffffff/000000?text=Roblox";

                    let rankHtml = "";
                    if (member.PermissionLevel >= 100) {
                        rankHtml = `<div class="member-rank-text rank-leader">Leader</div>`;
                    } else if (member.PermissionLevel === 90) {
                        rankHtml = `<div class="member-rank-text rank-officer">Officer</div>`;
                    }

                    const userPoints = member.resolvedPoints || 0;
                    const userDiamonds = member.resolvedDiamonds || 0;

                    membersHtml += `
                        <div class="member-card">
                            <div class="member-username-text">${usernameWithAt}</div>
                            ${rankHtml}
                            <div class="member-avatar-container">
                                <img class="member-avatar-img" src="${avatarUrl}" onerror="this.src='https://placehold.co/150x150/ffffff/000000?text=Roblox'">
                            </div>
                            
                            <div class="member-stats-container">
                                <img class="member-stat-star-icon" src="images/stars.png" >
                                <span class="member-stat-star-text">${formatNumber(userPoints)}</span>
                                <img class="member-stat-gem-icon" src="images/gems.png" >
                                <span class="member-stat-gem-text">${formatNumber(userDiamonds)}</span>
                            </div>
                        </div>
                    `;
                });

                if (listContainer) {
                    listContainer.innerHTML = membersHtml;
                    listContainer.scrollTop = savedScrollTop;
                }

                const loadingEl = document.getElementById("loadingState");
                if (loadingEl) loadingEl.style.display = "none";

            } catch (err) {
                console.error(err);
                if (container && !isSilent) {
                    container.innerHTML = `<div class="clan-error">Error loading clan details!</div>`;
                }
                hideMemberCountUI();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            autoFitScreen();
            loadClanProfile(false);
            
            setInterval(() => {
                loadClanProfile(true);
            }, 60000);
        });
    </script>
