    <script>
        const WORKER_URL = "https://rough-pine-d90f.ps99clans.workers.dev";
        const params = new URLSearchParams(window.location.search);
        const clanName = params.get('name') || "";

        localStorage.removeItem(`live_points_history_${clanName}`);

        const returnUrl = `clan-detail.html?name=${encodeURIComponent(clanName)}`;
        document.getElementById("liveBackBtn").onclick = () => { location.href = returnUrl; };
        document.getElementById("liveCloseBtn").onclick = () => { location.href = returnUrl; };

        let currentPoints = 0;
        let currentGems = 0;
        let currentMembers = 0;

        let lastApiPoints = 0; 
        let currentQuarterChunk = 0; 
        let ticksCalculated = 0; 
        let isFirstLoad = true;

        let simulationIntervalId = null;
        let pointsChart = null;
        let lastChartUpdateTime = 0; 

        function getTwemojiUrl(countryCode) {
            if (!countryCode || countryCode.length !== 2) return "https://twemoji.maxcdn.com/v/14.0.2/svg/1f1fa-1f1f8.svg";
            const codePoints = countryCode.toUpperCase().split('').map(char => 0x1F1E6 + char.charCodeAt(0) - 65);
            return `https://twemoji.maxcdn.com/v/14.0.2/svg/${codePoints[0].toString(16)}-${codePoints[1].toString(16)}.svg`;
        }

        function getClanIconUrl(iconString) {
            if (!iconString) return "https://placehold.co/150x150/ffffff/000000?text=No+Icon";
            const cleanId = iconString.replace("rbxassetid://", "").trim();
            if (!cleanId) return "https://placehold.co/150x150/ffffff/000000?text=No+Icon";
            return `https://ps99.biggamesapi.io/image/${cleanId}`;
        }

        function adjustDescSize(el) {
            if (!el) return;
            let currentSize = 22;
            el.style.fontSize = currentSize + "px";
            while (el.scrollHeight > 35 && currentSize > 10) {
                currentSize--;
                el.style.fontSize = currentSize + "px";
            }
        }

        function setRankTextAndScale(el, text) {
            if (!el) return;
            el.textContent = text;
            const len = text.length; 
            let size = 20; 
            if (len <= 3) size = 20; 
            else if (len === 4) size = 17; 
            else if (len >= 5) size = 13; 
            el.style.fontSize = size + "px";
        }

        function setStatOdometer(elId, val) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.innerHTML = val;
            const length = val.toString().length;
            let size = 28; 
            if (length > 12) size = 14;
            else if (length > 9) size = 17;
            else if (length > 6) size = 22;
            el.style.fontSize = size + "px";
        }

        function getPointsHistory() {
            const key = `live_points_history_${clanName}`;
            try {
                return JSON.parse(localStorage.getItem(key)) || [];
            } catch(e) {
                return [];
            }
        }

        function savePointsHistory(history) {
            const key = `live_points_history_${clanName}`;
            localStorage.setItem(key, JSON.stringify(history));
        }

        function updatePointsChart(pointsValue) {
            const ctx = document.getElementById('livePointsChart').getContext('2d');
            let history = getPointsHistory();
            const timeStr = new Date().toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const nowMs = Date.now();

            let shouldAddPoint = false;

            if (history.length === 0) {
                shouldAddPoint = true;
            } 
            else if (history[history.length - 1].value !== pointsValue) {
                shouldAddPoint = true;
            } 
            else if (nowMs - lastChartUpdateTime >= 15000) {
                shouldAddPoint = true;
            }

            if (shouldAddPoint) {
                history.push({ time: timeStr, value: pointsValue });
                lastChartUpdateTime = nowMs; 

                if (history.length > 1000) history.shift(); 
                savePointsHistory(history);
            }

            const labels = history.map(h => h.time);
            const data = history.map(h => h.value);

            if (pointsChart) {
                pointsChart.data.labels = labels;
                pointsChart.data.datasets[0].data = data;
                pointsChart.update('none'); 
            } else {
                pointsChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Points',
                            data: data,
                            borderColor: '#FFFFFF',
                            borderWidth: 3,
                            backgroundColor: (context) => {
                                const chart = context.chart;
                                const {ctx, chartArea} = chart;
                                if (!chartArea) return null;
                                const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                                gradient.addColorStop(0, 'rgba(28, 46, 74, 0.8)');
                                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.0)');
                                return gradient;
                            },
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: '#FFFFFF',
                            pointBorderColor: '#000000',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointHitRadius: 18 
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false 
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#FFFFF',
                                titleFont: { family: 'Fredoka', size: 14, weight: 'bold' },
                                bodyFont: { family: 'Roboto', size: 13, weight: 'bold' },
                                borderColor: '#000000',
                                borderWidth: 2,
                                cornerRadius: 6,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        let val = context.parsed.y;
                                        let dataset = context.dataset.data;
                                        let idx = context.dataIndex;
                                        let diffText = "";
                                        
                                        if (idx > 0) {
                                            let prevVal = dataset[idx - 1];
                                            let diff = val - prevVal;
                                            diffText = ` (+${diff.toLocaleString()})`;
                                        }
                                        
                                        return ` Points: ${val.toLocaleString()}${diffText}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(0, 0, 0, 0.08)' }, 
                                ticks: {
                                    color: '#262C2D', 
                                    font: { family: 'Fredoka', size: 11 }
                                }
                            },
                            y: {
                                grid: { color: 'rgba(0, 0, 0, 0.08)' }, 
                                ticks: {
                                    color: '#262C2D', 
                                    font: { family: 'Roboto', size: 11, weight: 'bold' },
                                    callback: function(value) {
                                        if (value >= 1e6) return (value / 1e6).toFixed(1) + 'M';
                                        if (value >= 1e3) return (value / 1e3).toFixed(1) + 'K';
                                        return value;
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }

        async function fetchLiveTrackerData() {
            const titleEl = document.getElementById("liveClanTitle");
            const descEl = document.getElementById("liveClanDesc");
            const iconEl = document.getElementById("liveClanIcon");
            const flagEl = document.getElementById("liveFlag");
            const statusEl = document.getElementById("liveStatusText");
            const pointsRankEl = document.getElementById("livePointsRank");
            const gemsRankEl = document.getElementById("liveGemsRank");

            if (!clanName) {
                if (statusEl) statusEl.textContent = "No clan specified!";
                return;
            }

            try {
                const res = await fetch(`${WORKER_URL}/clan/${clanName}`);
                const responseData = await res.json();

                if (!responseData || responseData.status !== "ok" || !responseData.data) {
                    const incomingPoints = isFirstLoad ? 611522 : 611779; 
                    currentGems = 152345091;
                    currentMembers = 75; 
                    
                    if (isFirstLoad) {
                        currentPoints = incomingPoints;
                        lastApiPoints = incomingPoints;
                        currentQuarterChunk = 0;
                        ticksCalculated = 0;
                        isFirstLoad = false;
                        updateUI();
                        updatePointsChart(incomingPoints);
                    } else {
                        if (incomingPoints !== lastApiPoints) {
                            const realDelta = incomingPoints - lastApiPoints;
                            lastApiPoints = incomingPoints;
                            
                            if (realDelta > 0) {
                                currentQuarterChunk = Math.round(realDelta / 4);
                                ticksCalculated = 0;
                                startNew15sCycle();
                            }
                        } else {
                            updatePointsChart(currentPoints);
                        }
                    }
                    if (statusEl) statusEl.style.display = "none";
                    return;
                }

                const clan = responseData.data;

                if (titleEl) titleEl.textContent = `[${clan.Name}]`;
                if (descEl) {
                    descEl.textContent = clan.Desc || "No description.";
                    adjustDescSize(descEl);
                }
                if (iconEl) iconEl.src = getClanIconUrl(clan.Icon);
                if (flagEl && clan.CountryCode) flagEl.src = getTwemojiUrl(clan.CountryCode);

                let activeBattleId = "";
                try {
                    const battleRes = await fetch(`${WORKER_URL}/activeClanBattle`);
                    const battleJson = await battleRes.json();
                    if (battleJson && battleJson.status === "ok" && battleJson.data) {
                        activeBattleId = battleJson.data.configName || battleJson.data.id || battleJson.data.Title || "";
                    }
                } catch (e) { console.warn(e); }

                let activeWarTotalPoints = 0; 
                let activeWarPlace = null; 
                if (clan.Battles && typeof clan.Battles === 'object') {
                    let matchedBattle = null;
                    if (activeBattleId && clan.Battles[activeBattleId]) matchedBattle = clan.Battles[activeBattleId];
                    else if (Array.isArray(clan.Battles)) matchedBattle = clan.Battles.find(b => b.BattleID === activeBattleId);
                    else {
                        const keys = Object.keys(clan.Battles);
                        if (keys.length > 0) matchedBattle = clan.Battles[keys[0]];
                    }
                    if (matchedBattle) {
                        activeWarTotalPoints = matchedBattle.Points || 0;
                        activeWarPlace = matchedBattle.Place || null; 
                    }
                }

                if (activeWarTotalPoints === 0 && clan.Points) activeWarTotalPoints = clan.Points;

                const incomingPoints = activeWarTotalPoints;
                currentGems = clan.DepositedDiamonds || clan.Diamonds || 0;
                
                const rawMembersLength = Array.isArray(clan.Members) ? clan.Members.length : 0;
                currentMembers = rawMembersLength > 0 ? rawMembersLength + 1 : 0;

                if (isFirstLoad) {
                    currentPoints = incomingPoints;
                    lastApiPoints = incomingPoints;
                    currentQuarterChunk = 0;
                    ticksCalculated = 0;
                    isFirstLoad = false;
                    updateUI();
                    updatePointsChart(incomingPoints);
                } else {
                    if (incomingPoints !== lastApiPoints) {
                        const realDelta = incomingPoints - lastApiPoints;
                        
                        lastApiPoints = incomingPoints;

                        if (realDelta > 0) {
                            currentQuarterChunk = Math.round(realDelta / 4);
                            ticksCalculated = 0; 
                            
                            startNew15sCycle();
                        } else {
                            currentQuarterChunk = 0;
                            ticksCalculated = 0;
                            currentPoints = incomingPoints;
                            updateUI();
                        }
                    } else {
                        updatePointsChart(currentPoints);
                    }
                }

                let calculatedPointsRank = "N/A";
                if (activeWarPlace !== null && activeWarPlace !== undefined) {
                    calculatedPointsRank = `#${activeWarPlace}`; 
                }
                setRankTextAndScale(pointsRankEl, calculatedPointsRank);

                let calculatedGemsRank = "N/A";
                try {
                    const listRes = await fetch(`${WORKER_URL}/clans?page=1&pageSize=1000&sort=DepositedDiamonds&sortOrder=desc`);
                    const listJson = await listRes.json();
                    if (listJson && listJson.status === "ok" && Array.isArray(listJson.data)) {
                        const foundIndex = listJson.data.findIndex(c => c.Name.toLowerCase() === clan.Name.toLowerCase());
                        if (foundIndex !== -1) calculatedGemsRank = `#${foundIndex + 1}`;
                    }
                } catch (e) {}
                setRankTextAndScale(gemsRankEl, calculatedGemsRank);

                if (statusEl) statusEl.style.display = "none";

            } catch (err) {
                console.warn(err);
                if (isFirstLoad) {
                    currentPoints = 611522;
                    lastApiPoints = 611522;
                    currentGems = 45612044;
                    currentMembers = 50 + 1; 
                    isFirstLoad = false;
                    updateUI();
                    updatePointsChart(currentPoints);
                }
                if (statusEl) statusEl.style.display = "none";
            }
        }

        function startNew15sCycle() {
            if (simulationIntervalId) {
                clearInterval(simulationIntervalId);
            }

            executeQuarterTick();

            simulationIntervalId = setInterval(handleSimulationTick, 15000);
        }

        function executeQuarterTick() {
            if (ticksCalculated < 4 && currentQuarterChunk > 0) {
                ticksCalculated++;
                
                if (ticksCalculated === 4) {
                    currentPoints = lastApiPoints;
                    if (simulationIntervalId) {
                        clearInterval(simulationIntervalId);
                        simulationIntervalId = null;
                    }
                } else {
                    currentPoints += currentQuarterChunk;
                }
                
                updateUI();
            }
        }

        function handleSimulationTick() {
            executeQuarterTick();
        }

        function updateUI() {
            const warPointsEl = document.getElementById("liveWarPoints");
            if (warPointsEl) {
                warPointsEl.innerHTML = currentPoints;
            }

            const avgPointsVal = currentMembers > 0 ? Math.round(currentPoints / currentMembers) : 0;

            setStatOdometer("liveStatGems", currentGems);
            setStatOdometer("liveStatAvgPoints", avgPointsVal);
            setStatOdometer("liveStatMembers", currentMembers);

            if (currentPoints > 0) {
                updatePointsChart(currentPoints);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchLiveTrackerData();
            
            setInterval(fetchLiveTrackerData, 2000);
        });
    </script>
</body>
</html>
