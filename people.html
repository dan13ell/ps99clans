    <!-- MOBILNÍ ORIENTATION POPUP -->
    <div class="orientation-popup-overlay" id="orientationPopup">
        <div class="orientation-popup-card">
            <div class="popup-close-x" id="popupCloseBtn"></div>
            
            <div class="popup-icon-container">
                <svg class="popup-icon-svg" viewBox="0 0 24 24">
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>

    <script>
        const WORKER_URL = "https://rough-pine-d90f.ps99clans.workers.dev";

        let playersData = [];
        let currentPage = 1;
        const itemsPerPage = 90;
        let searchQuery = "";
        let searchTimeout = null;

        function autoFitScreen() {
            const scaler = document.getElementById("appScaler");
            if (!scaler) return;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            if (winW >= 1150) {
                document.body.classList.remove("is-mobile");
                scaler.style.transform = "none";
                hideOrientationPopup();
                return;
            }

            document.body.classList.add("is-mobile");
            const requiredW = 1120;
            const requiredH = 960; 

            const scaleX = winW / requiredW;
            const scaleY = winH / requiredH;

            const scale = Math.min(scaleX, scaleY) * 0.92;
            scaler.style.transform = `scale(${scale})`;

            checkOrientationPopup();
        }

        /* --- LOGIKA ORIENTAČNÍHO POPUPU --- */
        function checkOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (!popup) return;

            const hasBeenDismissed = sessionStorage.getItem("orientationPopupDismissed") === "true";

            const isMobile = window.innerWidth < 1150;
            const isPortrait = window.innerHeight > window.innerWidth;

            if (isMobile && isPortrait && !hasBeenDismissed) {
                popup.classList.add("show");
            } else {
                popup.classList.remove("show");
            }
        }

        function dismissOrientationPopup() {
            sessionStorage.setItem("orientationPopupDismissed", "true");
            hideOrientationPopup();
        }

        function hideOrientationPopup() {
            const popup = document.getElementById("orientationPopup");
            if (popup) popup.classList.remove("show");
        }

        document.getElementById("popupCloseBtn")?.addEventListener("click", () => {
            dismissOrientationPopup();
        });

        document.getElementById("popupRotateActionBtn")?.addEventListener("click", () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(() => {});
            }
            dismissOrientationPopup();
        });

        window.addEventListener("resize", autoFitScreen);
        window.addEventListener("orientationchange", autoFitScreen);

        function formatNumber(num) {
            if (num === undefined || num === null) return "0";
            if (num >= 1e6) return (num / 1e6).toFixed(1) + "m";
            if (num >= 1e3) return (num / 1e3).toFixed(1) + "k";
            return num.toString();
        }

        async function loadAllAvatarsBatch(playersOnPage) {
            const userIds = playersOnPage.map(p => p.UserID).filter(id => id).join(",");
            if (!userIds) return;

            try {
                const response = await fetch(`${WORKER_URL}/roblox/avatars?userIds=${userIds}&size=150x150&format=Png&isCircular=true`);
                const json = await response.json();

                if (json && Array.isArray(json.data)) {
                    const avatarMap = {};
                    json.data.forEach(item => {
                        if (item && item.targetId && item.imageUrl) {
                            avatarMap[item.targetId] = item.imageUrl;
                        }
                    });

                    playersOnPage.forEach((player, index) => {
                        const imgElement = document.getElementById(`avatar-img-${player.UserID}-${index}`);
                        if (imgElement) {
                            imgElement.src = avatarMap[player.UserID] || "https://placehold.co/150x150/f0f4ff/1c1d22?text=Roblox";
                        }
                    });
                }
            } catch (err) {
                console.warn("Chyba při hromadném načítání avatarů:", err.message);
            }
        }

        async function fetchTopPlayers() {
            const overlay = document.getElementById("loadingOverlay");
            if (overlay) overlay.style.display = "flex";

            try {
                const res = await fetch(`${WORKER_URL}/api/top-war-players?page=${currentPage}&pageSize=${itemsPerPage}&search=${encodeURIComponent(searchQuery)}`);
                const json = await res.json();

                if (json && json.status === "ok" && Array.isArray(json.data)) {
                    playersData = json.data;
                    renderGrid();
                } else {
                    const grid = document.getElementById("playersGrid");
                    grid.innerHTML = `<div style="width: 100%; text-align: center; padding: 100px 0; font-size: 28px; font-weight: 800; color: white; -webkit-text-stroke: 4px black; paint-order: stroke fill;">No active war players found.</div>`;
                }
            } catch (err) {
                console.error(err);
                const grid = document.getElementById("playersGrid");
                grid.innerHTML = `<div style="width: 100%; text-align: center; padding: 100px 0; font-size: 28px; font-weight: 800; color: #ff4a4a; -webkit-text-stroke: 4px black; paint-order: stroke fill;">API Error.</div>`;
            } finally {
                if (overlay) overlay.style.display = "none";
            }
        }

        function renderGrid() {
            const grid = document.getElementById("playersGrid");
            grid.innerHTML = "";

            if (playersData.length === 0) {
                grid.innerHTML = `<div style="width: 100%; text-align: center; padding: 100px 0; font-size: 28px; font-weight: 800; color: white; -webkit-text-stroke: 4px black; paint-order: stroke fill;">No players match search.</div>`;
                return;
            }

            playersData.forEach((player, index) => {
                const absoluteRank = ((currentPage - 1) * itemsPerPage) + index + 1;
                const card = document.createElement("div");
                card.className = "player-card";

                const rankColor = (absoluteRank === 1) ? "#ffe066" : "#FFFFFF";
                const formattedPoints = formatNumber(player.Points);
                const imgId = `avatar-img-${player.UserID}-${index}`;

                card.innerHTML = `
                    <div class="player-rank" style="color: ${rankColor};">#${absoluteRank}</div>
                    <img class="player-avatar" id="${imgId}" src="https://placehold.co/150x150/f0f4ff/1c1d22?text=..." alt="Avatar" draggable="false">
                    <div class="player-userid">${player.UserID}</div>
                    <div class="player-clan-badge">${player.Clan}</div>
                    <div class="player-divider"></div>
                    <div class="player-points-box">
                        <div class="points-icon"></div>
                        <div class="player-points">${formattedPoints}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            loadAllAvatarsBatch(playersData);

            document.getElementById("pageNumberDisplay").textContent = currentPage;
        }

        document.getElementById("playerSearch").addEventListener("input", (e) => {
            searchQuery = e.target.value.trim();
            currentPage = 1;

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchTopPlayers();
            }, 300);
        });

        document.getElementById("prevPageBtn").addEventListener("click", (e) => {
            e.preventDefault();
            if (currentPage > 1) {
                currentPage--;
                fetchTopPlayers();
            }
        });

        document.getElementById("nextPageBtn").addEventListener("click", (e) => {
            e.preventDefault();
            currentPage++;
            fetchTopPlayers();
        });

        const footer = document.getElementById('leaderboardFooter');
        document.getElementById('prevPageBtn').addEventListener('mouseenter', () => footer.classList.add('hover-left'));
        document.getElementById('prevPageBtn').addEventListener('mouseleave', () => footer.classList.remove('hover-left'));
        document.getElementById('nextPageBtn').addEventListener('mouseenter', () => footer.classList.add('hover-right'));
        document.getElementById('nextPageBtn').addEventListener('mouseleave', () => footer.classList.remove('hover-right'));

        window.addEventListener('DOMContentLoaded', () => {
            autoFitScreen();
            fetchTopPlayers();
        });
    </script>
</body>
</html>
